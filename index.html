<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URC 2026 — Розклад</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root{
  --bg:#FFFFFF;
  --ink:#0E2A52;
  --ink-soft:#5C6B85;
  --blue:#0057B7;
  --blue-soft:#E8F1FC;
  --gold:#FFC93C;
  --gold-soft:#FFF4DA;
  --red:#D8203C;
  --line:#DEE6F0;
  --radius:10px;
}

*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font-family:'Inter',sans-serif;
  -webkit-font-smoothing:antialiased;
}

.flag-stripe{
  height:5px;width:100%;
  background:linear-gradient(to right,
    var(--blue) 0%, var(--blue) 25%,
    var(--gold) 25%, var(--gold) 50%,
    #ffffff 50%, #ffffff 51%, #ffffff 75%,
    var(--red) 75%, var(--red) 100%);
}

.wrap{max-width:760px;margin:0 auto;padding:0 16px 60px;}

header.top{
  position:sticky;top:0;z-index:20;
  background:var(--bg);
  padding:18px 16px 0;
  border-bottom:1px solid var(--line);
}
header.top .inner{max-width:760px;margin:0 auto;}

h1{
  font-family:'Inter',sans-serif;
  font-weight:800;
  font-size:24px;
  margin:0 0 4px;
  letter-spacing:-0.01em;
  color:var(--ink);
}
h1 .flags{font-size:18px;margin-right:4px;}
.subtitle{
  color:var(--ink-soft);
  font-size:13.5px;
  margin:0 0 14px;
  line-height:1.5;
}
.subtitle a{color:var(--blue);text-decoration:none;border-bottom:1px solid var(--blue-soft);}

.tabs{display:flex;gap:6px;margin-bottom:0;overflow-x:auto;padding-bottom:14px;}
.tab{
  flex:0 0 auto;
  padding:8px 16px;
  border-radius:999px;
  border:1px solid var(--line);
  background:var(--bg);
  font-size:13px;
  font-weight:700;
  color:var(--ink-soft);
  cursor:pointer;
  white-space:nowrap;
}
.tab.active{
  background:var(--ink);
  color:#fff;
  border-color:var(--ink);
}
.day-date{
  font-size:12.5px;color:var(--ink-soft);margin:10px 0 18px;font-weight:500;
}

.venue-group{margin-bottom:26px;}
.venue-title{
  font-family:'Inter',sans-serif;
  font-size:13.5px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.02em;
  color:var(--blue);
  margin:0 0 8px;
  padding-bottom:6px;
  border-bottom:2px solid var(--blue-soft);
}

.session{
  display:flex;
  gap:12px;
  align-items:flex-start;
  background:#fff;
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:12px 12px;
  margin-bottom:8px;
}
.session.picked{border-color:var(--blue);background:var(--blue-soft);}
.session.type-info,.session.type-closed{background:transparent;border-style:dashed;opacity:0.8;}

.s-time{
  font-family:'IBM Plex Mono',monospace;
  font-size:12.5px;
  font-weight:500;
  color:var(--ink);
  background:var(--gold-soft);
  border-radius:7px;
  padding:4px 7px;
  white-space:nowrap;
  flex:0 0 auto;
  margin-top:1px;
}
.type-info .s-time, .type-closed .s-time{background:transparent;color:var(--ink-soft);padding-left:0;}

.s-body{flex:1;min-width:0;}
.s-title{font-size:14.5px;font-weight:600;line-height:1.35;}
.s-place{font-size:12.5px;color:var(--ink-soft);margin-top:2px;}
.s-badge{
  display:inline-block;font-size:10.5px;font-weight:700;text-transform:uppercase;
  letter-spacing:0.03em;color:var(--red);margin-top:4px;
}
details.s-speakers{margin-top:6px;}
details.s-speakers summary{cursor:pointer;font-size:12px;color:var(--blue);font-weight:600;}
details.s-speakers .sp-text{font-size:12.5px;color:var(--ink-soft);margin-top:5px;line-height:1.5;}

.s-toggle{
  flex:0 0 auto;
  align-self:center;
  border:1.5px solid var(--blue);
  background:transparent;
  color:var(--blue);
  border-radius:8px;
  padding:7px 11px;
  font-size:12.5px;
  font-weight:700;
  cursor:pointer;
  font-family:'Inter',sans-serif;
  white-space:nowrap;
}
.s-toggle.on{background:#fff;border-color:var(--red);color:var(--red);}

.copy-day-wrap{margin-top:20px;}
.copy-day-btn{
  width:100%;
  padding:13px;
  border:none;
  border-radius:var(--radius);
  background:var(--ink);
  color:#fff;
  font-family:'Inter',sans-serif;
  font-weight:700;
  font-size:14.5px;
  cursor:pointer;
}
.copy-day-btn:hover{background:#163a6b;}
.copy-hint{font-size:12px;color:var(--ink-soft);text-align:center;margin-top:8px;}

.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--ink);color:#fff;padding:9px 16px;border-radius:999px;font-size:13px;
  opacity:0;transition:opacity .25s ease;z-index:50;pointer-events:none;
}
.toast.show{opacity:1;}

/* floating button + schedule panel */
.fab{
  position:fixed;right:16px;bottom:16px;z-index:30;
  background:var(--ink);color:#fff;border:none;border-radius:999px;
  padding:13px 18px;font-family:'Inter',sans-serif;font-weight:700;font-size:14px;
  box-shadow:0 6px 18px rgba(14,42,82,0.35);cursor:pointer;
}
.overlay{
  position:fixed;inset:0;background:rgba(14,42,82,0.45);z-index:40;display:none;
}
.overlay.show{display:block;}
.panel{
  position:fixed;left:0;right:0;bottom:0;z-index:41;
  background:var(--bg);border-radius:18px 18px 0 0;
  max-height:80vh;overflow-y:auto;
  padding:18px 18px 24px;
  transform:translateY(100%);transition:transform .25s ease;
}
.panel.show{transform:translateY(0);}
.panel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.panel-head h2{font-family:'Inter',sans-serif;font-weight:800;font-size:18px;margin:0;color:var(--ink);}
.panel-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--ink-soft);}
.panel-actions{display:flex;gap:8px;margin:10px 0 16px;}
.panel-actions button{
  flex:1;padding:9px;border-radius:9px;border:1px solid var(--line);background:#fff;
  font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;
}
.empty-state{color:var(--ink-soft);font-size:13.5px;text-align:center;padding:30px 10px;}
.sched-day-title{font-family:'Inter',sans-serif;font-size:12px;color:var(--blue);font-weight:700;margin:16px 0 8px;text-transform:uppercase;letter-spacing:0.02em;}
.sched-item{
  display:flex;gap:10px;align-items:flex-start;background:#fff;border:1px solid var(--line);
  border-radius:10px;padding:10px;margin-bottom:7px;
}
.sched-item .si-time{font-family:'IBM Plex Mono',monospace;font-size:12px;background:var(--gold-soft);border-radius:6px;padding:3px 6px;white-space:nowrap;}
.sched-item .si-body{flex:1;}
.sched-item .si-title{font-size:13.5px;font-weight:600;}
.sched-item .si-place{font-size:11.5px;color:var(--ink-soft);}
.sched-item .si-remove{background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;line-height:1;padding:2px;}
</style>
</head>

// ---------- flatten + parse ----------
let allSessions = [];
DAYS.forEach((day) => {
  day.groups.forEach((grp, gi) => {
    grp.sessions.forEach((s, si) => {
      const id = `${day.id}-${gi}-${si}`;
      const times = [...s.time.matchAll(/(\d{1,2}):(\d{2})/g)].map(m => parseInt(m[1])*60 + parseInt(m[2]));
      const start = times.length ? times[0] : null;
      allSessions.push({
        id, dayId: day.id, dayLabel: day.label, dayDate: day.date,
        venue: grp.venue, time: s.time, title: s.title, place: s.place,
        type: s.type || "session", speakers: s.speakers || null, start
      });
    });
  });
});

// ---------- state ----------
let picks = new Set();
let activeDay = "d1";

const $ = sel => document.querySelector(sel);
const tabsEl = $("#tabs"), dayDateEl = $("#dayDate"), sessionsRoot = $("#sessionsRoot");
const toastEl = $("#toast");
const fabBtn = $("#fabBtn"), fabCount = $("#fabCount");
const overlay = $("#overlay"), panel = $("#panel"), panelClose = $("#panelClose");
const scheduleRoot = $("#scheduleRoot"), copyAllBtn = $("#copyAllBtn");

function showToast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  setTimeout(() => toastEl.classList.remove("show"), 1800);
}

async function storeGet(key){
  try{ const r = await window.storage.get(key, false); return r ? r.value : null; }
  catch(e){ return null; }
}
async function storeSet(key, value){
  try{ await window.storage.set(key, value, false); }
  catch(e){ console.error("Storage set failed", e); }
}

function escapeHtml(str){
  const d = document.createElement("div");
  d.textContent = str;
  return d.innerHTML;
}

// ---------- rendering ----------
function renderTabs(){
  tabsEl.innerHTML = DAYS.map(d =>
    `<button class="tab ${d.id===activeDay?'active':''}" data-day="${d.id}">${d.label}</button>`
  ).join("");
  tabsEl.querySelectorAll(".tab").forEach(btn => {
    btn.addEventListener("click", () => { activeDay = btn.dataset.day; renderDay(); });
  });
}

function renderDay(){
  renderTabs();
  const day = DAYS.find(d => d.id === activeDay);
  dayDateEl.textContent = day.date;
  const groupsHtml = day.groups.map((grp, gi) => `
    <div class="venue-group">
      <div class="venue-title">${escapeHtml(grp.venue)}</div>
      ${grp.sessions.map((s, si) => renderSessionCard(`${day.id}-${gi}-${si}`)).join("")}
    </div>
  `).join("");

  sessionsRoot.innerHTML = groupsHtml + `
    <div class="copy-day-wrap">
      <button class="copy-day-btn" id="copyDayBtn">Скопіювати розклад — ${escapeHtml(day.label)}</button>
      <div class="copy-hint">Скопіює список обраних сесій цього дня — встав у Telegram, Viber чи лист</div>
    </div>
  `;

  sessionsRoot.querySelectorAll(".s-toggle").forEach(btn => {
    btn.addEventListener("click", () => toggleSession(btn.dataset.id));
  });
  $("#copyDayBtn").addEventListener("click", () => copyDay(day));
  fabCount.textContent = picks.size;
}

function renderSessionCard(id){
  const s = allSessions.find(x => x.id === id);
  const isPicked = picks.has(id);
  let toggleHtml = "";
  if (s.type === "closed"){
    toggleHtml = `<span class="s-badge">закрита подія</span>`;
  } else if (s.type === "info"){
    toggleHtml = "";
  } else {
    toggleHtml = `<button class="s-toggle ${isPicked?'on':''}" data-id="${id}">${isPicked ? '✕ Скасувати' : '+ Додати'}</button>`;
  }
  const speakersHtml = s.speakers ? `<details class="s-speakers"><summary>Спікери</summary><div class="sp-text">${escapeHtml(s.speakers)}</div></details>` : "";

  return `
    <div class="session type-${s.type} ${isPicked?'picked':''}">
      <div class="s-time">${escapeHtml(s.time)}</div>
      <div class="s-body">
        <div class="s-title">${escapeHtml(s.title)}</div>
        <div class="s-place">${escapeHtml(s.place)}</div>
        ${speakersHtml}
      </div>
      ${toggleHtml}
    </div>
  `;
}

async function toggleSession(id){
  if (picks.has(id)) picks.delete(id); else picks.add(id);
  renderDay();
  if (panel.classList.contains("show")) renderSchedulePanel();
  await storeSet("urc2026:picks", JSON.stringify([...picks]));
  showToast(picks.has(id) ? "Позначено ✓" : "Скасовано ✓");
}

function copyDay(day){
  const items = [...picks].map(id => allSessions.find(x => x.id === id))
    .filter(s => s && s.dayId === day.id)
    .sort((a,b) => (a.start??0)-(b.start??0));
  if (items.length === 0){ showToast("На цей день нічого не обрано"); return; }
  let text = `Розклад — ${day.label} (${day.date})\n\n`;
  items.forEach(s => { text += `• ${s.time} — ${s.title} (${s.place})\n`; });
  navigator.clipboard.writeText(text).then(() => showToast("Скопійовано в буфер"))
    .catch(() => showToast("Не вдалося скопіювати"));
}

function getAllPickedSorted(){
  return [...picks].map(id => allSessions.find(x => x.id === id)).filter(Boolean)
    .sort((a,b) => (a.dayId===b.dayId ? (a.start??0)-(b.start??0) : a.dayId.localeCompare(b.dayId)));
}

function renderSchedulePanel(){
  const items = getAllPickedSorted();
  if (items.length === 0){
    scheduleRoot.innerHTML = `<div class="empty-state">Поки що нічого не обрано.<br>Поверни розклад вище й натисни «+ Додати» біля потрібних сесій.</div>`;
    return;
  }
  let html = "";
  let lastDay = null;
  items.forEach(s => {
    if (s.dayId !== lastDay){
      html += `<div class="sched-day-title">${escapeHtml(s.dayLabel)} · ${escapeHtml(s.dayDate)}</div>`;
      lastDay = s.dayId;
    }
    html += `
      <div class="sched-item">
        <div class="si-time">${escapeHtml(s.time)}</div>
        <div class="si-body">
          <div class="si-title">${escapeHtml(s.title)}</div>
          <div class="si-place">${escapeHtml(s.venue)} · ${escapeHtml(s.place)}</div>
        </div>
        <button class="si-remove" data-id="${s.id}" title="Видалити">✕</button>
      </div>
    `;
  });
  scheduleRoot.innerHTML = html;
  scheduleRoot.querySelectorAll(".si-remove").forEach(btn => {
    btn.addEventListener("click", () => toggleSession(btn.dataset.id));
  });
}

fabBtn.addEventListener("click", () => {
  renderSchedulePanel();
  overlay.classList.add("show");
  panel.classList.add("show");
});
function closePanel(){
  overlay.classList.remove("show");
  panel.classList.remove("show");
}
panelClose.addEventListener("click", closePanel);
overlay.addEventListener("click", closePanel);

copyAllBtn.addEventListener("click", () => {
  const items = getAllPickedSorted();
  if (items.length === 0){ showToast("Розклад порожній"); return; }
  let text = "Мій розклад — URC 2026\n";
  let lastDay = null;
  items.forEach(s => {
    if (s.dayId !== lastDay){ text += `\n${s.dayLabel} (${s.dayDate})\n`; lastDay = s.dayId; }
    text += `• ${s.time} — ${s.title} (${s.place})\n`;
  });
  navigator.clipboard.writeText(text).then(() => showToast("Скопійовано в буфер"))
    .catch(() => showToast("Не вдалося скопіювати"));
});

// ---------- init ----------
(async function init(){
  const raw = await storeGet("urc2026:picks");
  if (raw){ try{ picks = new Set(JSON.parse(raw)); }catch(e){} }
  renderDay();
})();
</script>
